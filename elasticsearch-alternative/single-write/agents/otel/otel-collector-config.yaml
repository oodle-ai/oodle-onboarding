receivers:
  otlp:
    protocols:
      http:
        endpoint: "0.0.0.0:4318"
      grpc:
        endpoint: "0.0.0.0:4317"

processors:
  batch:
    timeout: 10s
    send_batch_size: 1024

exporters:
  # Elasticsearch direct (no Data Prepper needed)
  elasticsearch:
    endpoints:
      - http://elasticsearch:9200
    logs_index: logs
    sending_queue:
      enabled: true
    retry:
      enabled: true

service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [elasticsearch]
