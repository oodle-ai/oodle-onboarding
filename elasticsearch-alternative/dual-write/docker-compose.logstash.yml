version: '3.8'

services:
  logstash:
    image: docker.elastic.co/logstash/logstash:8.17.0
    container_name: logstash
    volumes:
      - ./agents/logstash/pipeline/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
      - ./agents/logstash/logstash.yml:/usr/share/logstash/config/logstash.yml
    ports:
      - "5044:5044"
      - "9600:9600"
    environment:
      - OODLE_INSTANCE=${OODLE_INSTANCE}
      - OODLE_API_KEY=${OODLE_API_KEY}
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    depends_on:
      - elasticsearch
    networks:
      - elastic-net

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.17.0
    container_name: filebeat
    user: root
    command: ["filebeat", "-e", "--strict.perms=false"]
    volumes:
      - ./agents/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - logstash
      - demo-app
    networks:
      - elastic-net

  logstash-exporter:
    image: kuskoman/logstash-exporter:v1.8.3
    container_name: logstash-exporter
    environment:
      - LOGSTASH_URL=http://logstash:9600
    ports:
      - "9198:9198"
    depends_on:
      - logstash
    networks:
      - elastic-net

  beat-exporter:
    image: trustpilot/beat-exporter:0.4.0
    container_name: beat-exporter
    command:
      - -beat.uri=http://filebeat:5066
    ports:
      - "9479:9479"
    depends_on:
      - filebeat
    networks:
      - elastic-net
