global:
  scrape_interval: 15s
  external_labels:
    agent: vector
    env: demo

remote_write:
  - url: "OODLE_REMOTE_WRITE_URL"
    name: oodle-remote-write
    headers:
      X-API-KEY: "OODLE_API_KEY_VALUE"

scrape_configs:
  - job_name: vector
    static_configs:
      - targets: ["vector:9598"]
