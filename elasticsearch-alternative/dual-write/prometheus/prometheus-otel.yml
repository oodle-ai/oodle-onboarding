global:
  scrape_interval: 15s
  external_labels:
    agent: otel
    env: demo

remote_write:
  - url: "OODLE_REMOTE_WRITE_URL"
    name: oodle-remote-write
    headers:
      X-API-KEY: "OODLE_API_KEY_VALUE"

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
