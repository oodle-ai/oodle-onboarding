global:
  scrape_interval: 15s
  external_labels:
    agent: logstash
    env: demo

remote_write:
  - url: "OODLE_REMOTE_WRITE_URL"
    name: oodle-remote-write
    headers:
      X-API-KEY: "OODLE_API_KEY_VALUE"

scrape_configs:
  - job_name: logstash
    static_configs:
      - targets: ["logstash-exporter:9198"]

  - job_name: filebeat
    static_configs:
      - targets: ["beat-exporter:9479"]
