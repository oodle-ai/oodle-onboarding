input {
  beats {
    port => 5044
  }
}

filter {
  json {
    source => "message"
  }

  mutate {
    remove_field => ["@version", "beat", "prospector", "source", "offset", "input"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "logs"
    document_type => "_doc"
  }

  http {
    url => "https://${OODLE_INSTANCE}-logs.collector.oodle.ai/ingest/v1/logs"
    http_method => "post"
    format => "json_batch"
    content_type => "application/json"
    headers => {
      "X-OODLE-INSTANCE" => "${OODLE_INSTANCE}"
      "X-API-KEY" => "${OODLE_API_KEY}"
    }
  }
}
