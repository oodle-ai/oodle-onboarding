input {
  gelf {
    port => 12201
    type => "docker"
  }
}

filter {
  # Parse the JSON message emitted by the demo app
  json {
    source => "message"
    target => "parsed"
  }

  # Promote parsed fields to the top level
  if [parsed] {
    mutate {
      rename => {
        "[parsed][timestamp]" => "timestamp"
        "[parsed][level]" => "level"
        "[parsed][message]" => "message"
        "[parsed][service]" => "service"
        "[parsed][log]" => "log"
      }
      remove_field => ["parsed"]
    }
  }

  # Set @timestamp from the app timestamp for Kibana
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # Remove Docker/GELF metadata fields that are not needed
  mutate {
    remove_field => ["source_host", "host", "facility", "facility_label", "severity", "severity_label", "command", "container_id", "container_name", "image_id", "image_name", "tag", "type", "version", "@version", "created"]
  }
}

# Elasticsearch local
output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "logs"
  }

  # Oodle
  http {
    url => "https://${OODLE_INSTANCE}-logs.collector.oodle.ai/ingest/v1/logs"
    http_method => "post"
    format => "json"
    http_compression => true
    headers => {
      "X-OODLE-INSTANCE" => "${OODLE_INSTANCE}"
      "X-API-KEY" => "${OODLE_API_KEY}"
    }
  }
}
