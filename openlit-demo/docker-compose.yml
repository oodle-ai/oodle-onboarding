services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: openlit-otel-collector
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4319:4318"
      - "13134:13133"
    environment:
      - OODLE_INSTANCE=${OODLE_INSTANCE}
      - OODLE_API_KEY=${OODLE_API_KEY}
    networks:
      - openlit-net

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: openlit-mcp-server
    ports:
      - "8080:8080"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    depends_on:
      - otel-collector
    networks:
      - openlit-net

  rag-server:
    build:
      context: ./rag-server
      dockerfile: Dockerfile
    container_name: openlit-rag-server
    ports:
      - "8091:8091"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - PORT=8091
    depends_on:
      - otel-collector
    networks:
      - openlit-net

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: openlit-demo-app
    ports:
      - "8090:8090"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - MCP_SERVER_URL=http://mcp-server:8080/sse
      - PORT=8090
    depends_on:
      - otel-collector
      - mcp-server
    networks:
      - openlit-net

networks:
  openlit-net:
    driver: bridge
