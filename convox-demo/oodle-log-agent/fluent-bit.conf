# Fluent Bit host-local log agent for Convox (generation 2, ECS/EC2).
#
# Pipeline:
#   syslog(5140) -> rewrite_tag(container short-id -> tag) -> ecs(introspection lookup)
#                -> lua(clean app name) -> { CloudWatch per-app group, Oodle HTTP }
#
# The whole reason this exists: Convox's Syslog driver ships NO tag, so the payload only
# carries the container short-id (appname). The `ecs` filter resolves short-id -> app via the
# ECS Agent introspection API. On a Convox bridge-mode agent that endpoint is NOT on
# 127.0.0.1 (the container's own loopback) but on the docker bridge gateway 172.17.0.1:51678
# (verified on gm-test). This gives per-app routing with no per-app config.
#
# MIGRATION: this file ships the DUAL-WRITE phase (CloudWatch + Oodle). To move to the
# SINGLE-WRITE phase (Oodle only), delete the `cloudwatch_logs` OUTPUT block below (and drop the
# agent's CloudWatch IAM) and redeploy — Oodle keeps flowing, nothing else changes. See README.

[SERVICE]
    Flush         5
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers-convox.conf
    Daemon        off

[INPUT]
    Name          syslog
    Mode          tcp
    Listen        0.0.0.0
    Port          5140
    Parser        syslog-rfc5424-convox
    Tag           raw.syslog

# Move the container short-id (appname) into the tag; the ecs filter keys off the tag.
# The regex guard ensures we only re-emit records whose appname looks like a container id.
[FILTER]
    Name          rewrite_tag
    Match         raw.syslog
    Rule          $appname ^([0-9a-f]{12,64})$ ecs.$appname false
    Emitter_Name  re_ecs

# Enrich with ECS task metadata via the host-local introspection API (bridge gateway).
# We write Oodle's CANONICAL log field names (task_definition/task_id/container_name/cluster)
# so they land on Oodle's indexed top-level fields instead of the nested `log.*` blob.
[FILTER]
    Name             ecs
    Match            ecs.*
    ECS_Meta_Host    172.17.0.1
    ECS_Meta_Port    51678
    ECS_Tag_Prefix   ecs.
    Add              task_definition $TaskDefinitionFamily
    Add              task_id $TaskID
    Add              container_name $ECSContainerName
    Add              cluster $ClusterName

# Reduce the ECS family to a clean Convox app name and map to Oodle's canonical `service`.
[FILTER]
    Name          lua
    Match         ecs.*
    Script        /fluent-bit/etc/derive_app.lua
    Call          derive_app

# ======================================================================================
# DUAL-WRITE ONLY — CloudWatch, mirroring Convox's native names as closely as possible:
#   group  = <rack>-<app>-LogGroup-oodle    (Convox: <rack>-<app>-LogGroup-<cfn-hash>; cw_group
#            is composed in derive_app.lua because templates can't put a hyphen after a $variable)
#   stream = service.<container>.<task-id>  (Convox: service/<container>/<task-id>; the core
#            cloudwatch_logs plugin only allows `.`/`,` between template variables, not `/`)
# container_name and task_id come from the `ecs` filter above. Auto-created groups get a 7-day
# retention (Log_Retention_Days), so agent-owned groups self-expire instead of growing forever.
# Delete this whole OUTPUT block (and the agent's CloudWatch IAM) to switch to SINGLE-WRITE
# (Oodle only). Records that failed enrichment fall back to unresolved-LogGroup-oodle, never dropped.
# ======================================================================================
[OUTPUT]
    Name                cloudwatch_logs
    Match               ecs.*
    Region              us-east-1
    Log_Group_Name      unresolved-LogGroup-oodle
    Log_Group_Template  $cw_group
    Log_Stream_Name     service.unresolved
    Log_Stream_Template service.$container_name.$task_id
    Auto_Create_Group   On
    Log_Retention_Days  7

# --- Oodle: native HTTP JSON logs ingest (per Oodle's logs_fluent_bit integration spec).
#     Path is /ingest/v1/logs (NOT the OTLP /ingest/otel/... path). Enrichment rides along as
#     structured JSON fields. Host/key come from the environment (never committed).
#     This is the SINGLE-WRITE destination — it stays after CloudWatch is removed.
[OUTPUT]
    Name             http
    Match            ecs.*
    Host             ${OODLE_INSTANCE}-logs.collector.oodle.ai
    Port             443
    Uri              /ingest/v1/logs
    Format           json
    Compress         gzip
    Tls              On
    Header           X-OODLE-INSTANCE ${OODLE_INSTANCE}
    Header           X-API-KEY ${OODLE_API_KEY}
    Json_date_key    timestamp
    Json_date_format iso8601

# --- Debug (optional): echo enriched records to this agent's own log so you can eyeball that
#     `service`/`task_definition` resolved. Remove in production to halve the agent's log volume.
[OUTPUT]
    Name          stdout
    Match         ecs.*
    Format        json_lines
