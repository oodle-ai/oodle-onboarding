# Convox v2 (generation 2) manifest for the Fluent Bit host-local log agent.
#
# Runs as an agent (one per rack instance, DaemonSet-style) binding host port 5140, so any app's
# Syslog log driver can target tcp://localhost:5140 on the same host.
# `ports` is nested under `agent:` (gen-2 syntax; top-level ports on an agent are ignored).
environment:
  - OODLE_INSTANCE
  - OODLE_API_KEY
  - RACK_PREFIX          # short rack name (e.g. gm-test) — used to clean up the app name
services:
  collector:
    agent:
      enabled: true
      ports:
        - 5140/tcp
    build: .
    scale:
      cpu: 128
      memory: 256
