# OTel Collector (contrib) config for the Convox host-local log agent.
#
# Receives syslog (rfc5424) from Convox's per-app Syslog log driver on localhost:5140,
# then fans out to BOTH CloudWatch and Oodle. This collector is the fan-out point:
# to stop writing to CloudWatch later, delete the awscloudwatchlogs exporter (and its
# pipeline entry) and redeploy — Oodle keeps flowing, no app changes.

receivers:
  syslog:
    tcp:
      listen_address: 0.0.0.0:5140   # host-networked agent; localhost + instance IP both reach this
    protocol: rfc5424                 # matches Convox app param SyslogFormat=rfc5424

processors:
  # Tag the logs so they're identifiable in Oodle / CloudWatch.
  resource:
    attributes:
      - key: service.name
        value: rails-demo
        action: upsert
      - key: convox.rack
        value: gm-test
        action: upsert
      - key: deployment.source
        value: convox-syslog
        action: upsert
  # Reconstruct the original container stdout line by dropping the rfc5424 syslog envelope
  # (the receiver keeps the parsed line in attributes["message"]). This makes the CloudWatch
  # copy match the pre-syslog `awslogs` format exactly — no downstream migration friction.
  transform/rawline:
    error_mode: ignore
    log_statements:
      - context: log
        statements:
          - set(body, attributes["message"]) where attributes["message"] != nil
  batch:
    timeout: 5s
    send_batch_size: 1000

exporters:
  # --- CloudWatch (removable: delete this exporter + its pipeline ref to drop CloudWatch) ---
  awscloudwatchlogs:
    region: us-east-1
    # Same group name the native Convox `awslogs` driver used, so dashboards / queries / metric
    # filters that reference it keep working. This exporter (NOT Convox CloudFormation) owns the
    # group, so it is NOT deleted when rails-demo toggles LogDriver — it persists across switches.
    log_group_name: "${env:CW_LOG_GROUP}"
    log_stream_name: web
    raw_log: true   # export just the reconstructed log line (matches original stdout), not OTel JSON
    # group/stream auto-created if the task role allows it (see IamPolicy in the Makefile).

  # --- Oodle ---
  otlphttp/oodle:
    logs_endpoint: "https://${env:OODLE_INSTANCE}-logs.collector.oodle.ai/ingest/otel/v1/logs"
    headers:
      X-OODLE-INSTANCE: "${env:OODLE_INSTANCE}"
      X-API-KEY: "${env:OODLE_API_KEY}"
    timeout: 120s
    retry_on_failure:
      enabled: true
      initial_interval: 2s
      max_interval: 45s
      max_elapsed_time: 12m

service:
  pipelines:
    logs:
      receivers: [syslog]
      processors: [resource, transform/rawline, batch]
      exporters: [awscloudwatchlogs, otlphttp/oodle]
  telemetry:
    logs:
      level: info
