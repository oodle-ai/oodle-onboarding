# Convox v2 (generation 2) manifest.
# Deploys the Rails web service backed by a Convox-managed Postgres resource.
environment:
  - RAILS_ENV=production
  - RAILS_LOG_TO_STDOUT=true
  - RAILS_SERVE_STATIC_FILES=true
  - RAILS_MAX_THREADS=5
  - SECRET_KEY_BASE
  # Datadog APM — point the ddtrace gem at the host-local DD agent (the datadog-agent/
  # `agent:` daemon) via the docker bridge gateway. These MUST be declared here: Convox
  # only injects env vars that a service's manifest declares — vars set only via
  # `convox env set` are stored but never reach the container.
  - DD_AGENT_HOST=172.17.0.1
  - DD_TRACE_AGENT_PORT=8126
  - DD_SERVICE=rails-demo
  - DD_ENV=sales
  - DD_VERSION=1.0.0
# Convox-managed containerized Postgres. Linking it to `web` (below) injects
# DATABASE_URL (+ DATABASE_HOST/PORT/USER/PASS/NAME) into the web container.
resources:
  database:
    type: postgres
    options:
      version: "16"
      storage: 10
services:
  web:
    build: .
    port: 3000
    health:
      path: /up
      interval: 10
      timeout: 5
    resources:
      - database
    scale:
      count: 1
      cpu: 128
      memory: 256
