# Fluent Bit host-local log agent for Convox (generation 2, ECS/EC2).
#
# Pipeline:
#   syslog(5141) -> rewrite_tag(container short-id -> tag) -> ecs(introspection lookup)
#                -> lua(clean app name) -> {cloudwatch per-app group, OTLP -> Oodle, stdout}
#
# The whole reason this exists: Convox's Syslog driver ships NO tag, so the payload only
# carries the container short-id (appname). The `ecs` filter resolves short-id -> app via the
# ECS Agent introspection API. On a Convox bridge-mode agent that endpoint is NOT on
# 127.0.0.1 (the container's own loopback) but on the docker bridge gateway 172.17.0.1:51678
# (verified on gm-test). This gives per-app routing with no per-app config.

[SERVICE]
    Flush         5
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers-convox.conf
    Daemon        off

[INPUT]
    Name          syslog
    Mode          tcp
    Listen        0.0.0.0
    Port          5141
    Parser        syslog-rfc5424-convox
    Tag           raw.syslog

# Move the container short-id (appname) into the tag; the ecs filter keys off the tag.
# The regex guard ensures we only re-emit records whose appname looks like a container id.
[FILTER]
    Name          rewrite_tag
    Match         raw.syslog
    Rule          $appname ^([0-9a-f]{12,64})$ ecs.$appname false
    Emitter_Name  re_ecs

# Enrich with ECS task metadata via the host-local introspection API (bridge gateway).
# We write Oodle's CANONICAL log field names (task_definition/task_id/container_name/cluster)
# so they land on Oodle's indexed top-level fields instead of the nested `log.*` blob.
[FILTER]
    Name             ecs
    Match            ecs.*
    ECS_Meta_Host    172.17.0.1
    ECS_Meta_Port    51678
    ECS_Tag_Prefix   ecs.
    Add              task_definition $TaskDefinitionFamily
    Add              task_id $TaskID
    Add              container_name $ECSContainerName
    Add              cluster $ClusterName

# Reduce the ECS family to a clean Convox app name and map to Oodle's canonical `service`.
[FILTER]
    Name          lua
    Match         ecs.*
    Script        /fluent-bit/etc/derive_app.lua
    Call          derive_app

# --- CloudWatch: one log group PER APP, templated from the derived name. ---
# Records that failed enrichment (no `app`) fall back to /convox/unresolved so nothing is lost.
[OUTPUT]
    Name                cloudwatch_logs
    Match               ecs.*
    Region              us-east-1
    Log_Group_Name      /convox/unresolved
    Log_Group_Template  /convox/$service
    Log_Stream_Name     web
    Auto_Create_Group   On

# --- Oodle: native HTTP JSON logs ingest (per Oodle's logs_fluent_bit integration spec).
#     Simpler than the OTLP output and carries all our enrichment fields (app, ecs_*) as
#     structured JSON. Note the path is /ingest/v1/logs (NOT the OTLP /ingest/otel/... path).
#     Host/key come from the environment (never committed).
[OUTPUT]
    Name             http
    Match            ecs.*
    Host             ${OODLE_INSTANCE}-logs.collector.oodle.ai
    Port             443
    Uri              /ingest/v1/logs
    Format           json
    Compress         gzip
    Tls              On
    Header           X-OODLE-INSTANCE ${OODLE_INSTANCE}
    Header           X-API-KEY ${OODLE_API_KEY}
    Json_date_key    timestamp
    Json_date_format iso8601

# --- Debug (validation only): echo enriched records to this agent's own log so we can
#     eyeball that `app`/`ecs_task_family` resolved. Remove for production to halve log volume.
[OUTPUT]
    Name          stdout
    Match         ecs.*
    Format        json_lines
