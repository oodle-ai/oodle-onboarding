# rfc5424 parser for Convox's Docker syslog driver output.
# Convox sets LogDriver=Syslog with syslog-format=rfc5424 and NO `tag` opt, so Docker
# fills APP-NAME with the 12-char container short-id (that's `appname` below). We name the
# capture groups explicitly (vs Fluent Bit's stock parser, which calls app-name `ident`)
# so downstream filters can reference $appname directly.
[PARSER]
    Name        syslog-rfc5424-convox
    Format      regex
    Regex       ^\<(?<pri>[0-9]{1,5})\>1 (?<time>[^ ]+) (?<hostname>[^ ]+) (?<appname>[^ ]+) (?<procid>[-0-9]+) (?<msgid>[^ ]+) (?<sd>(\[.*\]|-)) (?<message>.+)$
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z
    Time_Keep   On
