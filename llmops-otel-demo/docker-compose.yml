services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: llmops-otel-collector
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4319:4318"
      - "13134:13133"
    environment:
      - OODLE_INSTANCE=${OODLE_INSTANCE}
      - OODLE_API_KEY=${OODLE_API_KEY}
    networks:
      - llmops-net

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: llmops-otel-demo-app
    ports:
      - "8090:8090"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-flash-latest}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SEMCONV_STABILITY_OPT_IN=gen_ai_latest_experimental
      - OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT=span_and_event
      - LOG_LLM_CONTENT=${LOG_LLM_CONTENT:-false}
      - PORT=8090
    depends_on:
      - otel-collector
    networks:
      - llmops-net

networks:
  llmops-net:
    driver: bridge
